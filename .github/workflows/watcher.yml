name: ClawClones Watcher

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run registry watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/watcher/registry.ts

      - name: Check for generated adapters
        id: check
        run: |
          if git diff --quiet && git ls-files --others --exclude-standard | grep -q '\.ts$'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif ! git diff --quiet; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR for new/updated adapters
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="watcher/adapters-${DATE}"
          git config user.name "clawport-watcher[bot]"
          git config user.email "watcher@clawport-cli"
          git checkout -b "$BRANCH"
          git add src/adapters/ .watcher-state.json
          git commit -m "chore: watcher — new/updated adapter skeletons ${DATE}"
          git push origin "$BRANCH"
          gh pr create \
            --title "watcher: new/updated adapter skeletons ${DATE}" \
            --body "$(cat <<'EOF'
          ## Watcher Run: ${DATE}

          Auto-generated adapter skeletons for newly integrated or updated clones.

          **Action required before merge:**
          - [ ] Review each `.generated.ts` file — diff against existing adapter if present
          - [ ] Implement exact field mappings (replace stubs)
          - [ ] Resolve all `UNMAPPED` comments
          - [ ] Register finalized adapters in `src/adapters/index.ts`
          - [ ] Delete `.generated.ts` files after integrating

          Generated by clawport-watcher. Do not merge without manual review.
          EOF
          )" \
            --label "watcher" \
            --repo maxtongwang/clawport-cli
